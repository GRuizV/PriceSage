# Runs the (offline, no-secrets) test suite on every push and PR.
# Independent of collect.yml — this is the regression gate; that one collects data.
# Daily bot data-commits are pushed with GITHUB_TOKEN, which does not trigger
# workflows, so this never runs on the automated data commits.
name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q
