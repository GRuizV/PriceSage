# Daily price collection. Runs the collector, commits the JSONL history back to
# the repo, and (only on failures) uploads the captured response bodies as an
# artifact for post-mortem.
#
# The job goes RED only on a real crash. A vendor failing after retries is a
# tracked condition (recorded in collection_runs) — the collector still exits 0,
# so the run stays green. Persistent failures surface via the alert path, not CI.
name: collect

on:
  schedule:
    - cron: "0 13 * * *"   # daily 13:00 UTC = 08:00 America/Bogota
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write           # needed to commit collected data back to the repo

concurrency:
  group: collect
  cancel-in-progress: false # let an in-flight run finish rather than truncating a collection

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Collect prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python -m pricesage

      - name: Upload failure bodies
        if: always()          # capture evidence even if a later step fails
        uses: actions/upload-artifact@v4
        with:
          name: debug-failures
          path: |
            data/debug/*.json
            data/debug/*.html
            data/debug/*.txt
          if-no-files-found: ignore   # no failures -> nothing to upload
          retention-days: 30

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: daily collection ($(date -u +%F))"
            git push
          fi
